name: Build Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: |
        cd frontend
        npm install

    - name: Build React app
      run: |
        cd frontend
        npm run build

    - name: Build Electron app (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd frontend
        npx electron-builder --linux

    - name: Build Electron app (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cd frontend
        npx electron-builder --windows

    - name: Build Electron app (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd frontend
        npx electron-builder --mac

    - name: Upload Linux artifact
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: data_checker_linux
        path: frontend/dist/*.deb

    - name: Upload Windows artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: data_checker_windows
        path: frontend/dist/*.exe

    - name: Upload macOS artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: data_checker_macos
        path: frontend/dist/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Install GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
        && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update && sudo apt install gh -y

    - name: Create Release with gh CLI
      run: |
        gh release create v1.0.${{ github.run_number }} \
          --title "Release v1.0.${{ github.run_number }}" \
          --notes "Automated release for build ${{ github.run_number }}" \
          data_checker_linux/*.deb \
          data_checker_windows/*.exe \
          data_checker_macos/*.dmg
      env:
        GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}